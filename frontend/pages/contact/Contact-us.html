<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Shri Manjunatha</title>

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="/css/contact.css">
<link rel="stylesheet" href="/css/ii.css">

</head>

<body>

<!-- ✅ GLOBAL NAVBAR -->
<div id="header"></div>

<!-- ================= BREADCRUMB ================= -->

<div class="breadcrumb">
  <a href="/pages/home/Landing.html">Home</a> &gt; Contact Us
</div>

<!-- ================= CONTACT FORM ================= -->

<section class="container">

<h1>Contact Us</h1>

<p class="contact-info">
You can reach us at
<strong>wedding@sanskaridecor.com</strong>
or <strong>987654XXXX</strong>
</p>

<h3>Enter Your Details</h3>

<form class="contact-form">

<input name="firstName" placeholder="First Name" required>
<input name="lastName" placeholder="Last Name" required>

<input name="email" type="email"
placeholder="Email ID (eg: abc@xyz.com)" required>

<input name="subject" placeholder="Subject" required>

<label>Contact No:</label>
<input name="phone" type="tel" placeholder="Enter contact number" required>

<textarea name="message" rows="5"
placeholder="Message" required></textarea>

<small>Describe your query in detail..</small>

<div class="recaptcha">
<input type="checkbox" required> I'm not a robot
</div>

<button type="submit">Submit</button>

</form>

</section>

<!-- ✅ LOAD GLOBAL HEADER -->
<script src="/js/loadHeader.js"></script>

<script>
const API_BASE = 'http://localhost:5000/api';

document.querySelector('.contact-form')
.addEventListener('submit', async (e) => {

e.preventDefault();

const formData = new FormData(e.target);
const data = Object.fromEntries(formData.entries());

try {

const res = await fetch(`${API_BASE}/contact`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(data)
});

const result = await res.json();

if(res.ok){
alert('Contact form submitted successfully!');
e.target.reset();
}else{
alert(result.message || 'Something went wrong');
}

} catch(err){
alert('Server error');
}

});
</script>

</body>
</html>
