<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Payment Failed - Shri Manjunatha Shamiyana Works & Events">

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="/css/ii.css">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Payment Failed</title>

<style>
body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#f5f5f5;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
padding:20px;
}
.failure-container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
max-width:500px;
width:100%;
}
.failure-icon{
width:100px;
height:100px;
background:#dc3545;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 30px;
}
.failure-icon i{
font-size:50px;
color:white;
}
h1{color:#dc3545;margin-bottom:15px;}
.error-details{
background:#f8f9fa;
padding:20px;
border-radius:10px;
margin:25px 0;
text-align:left;
}
.btn{
display:inline-block;
padding:15px 30px;
background:#8B4513;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
margin:5px;
}
.btn-secondary{background:#6c757d;}
</style>
</head>

<body>

<div class="failure-container">

<div class="failure-icon">
<i class="fa fa-times"></i>
</div>

<h1>Payment Failed</h1>

<p>Your payment could not be processed. Please try again.</p>

<div class="error-details">
<p><strong>Error Code:</strong> <span id="errorCode">PAYMENT_FAILED</span></p>
<p><strong>Description:</strong> <span id="errorDescription">Transaction declined</span></p>
<p><strong>Order ID:</strong> <span id="orderId">N/A</span></p>
<p><strong>Amount:</strong> <span id="amount">₹0</span></p>
<p><strong>Date:</strong> <span id="date">N/A</span></p>
</div>

<div>

<a href="/pages/checkout/checkout.html" class="btn">
Try Again
</a>

<a href="/pages/home/Landing.html" class="btn btn-secondary">
Continue Shopping
</a>

</div>

</div>

<script>
const urlParams=new URLSearchParams(window.location.search);

document.getElementById('orderId').textContent=
urlParams.get('orderId')||'N/A';

document.getElementById('amount').textContent=
'₹'+(urlParams.get('amount')||'0');

document.getElementById('errorCode').textContent=
urlParams.get('errorCode')||'PAYMENT_FAILED';

document.getElementById('errorDescription').textContent=
urlParams.get('errorDescription')||'Transaction declined';

document.getElementById('date').textContent=
new Date().toLocaleDateString('en-IN',{
year:'numeric',month:'long',day:'numeric'
});
</script>

</body>
</html>
