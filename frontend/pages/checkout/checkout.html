<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="/css/ii.css">
<link rel="stylesheet" href="/css/checkout.css">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<!-- RAZORPAY -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<!-- ✅ GLOBAL NAVBAR -->
<div id="header"></div>

<!-- ================= CHECKOUT ================= -->

<div class="checkout-container">

  <h1>Checkout</h1>

  <div class="checkout-grid">

    <!-- SHIPPING -->
    <div class="checkout-form">

      <h3>Shipping</h3>

      <input id="fullName" placeholder="Full Name">
      <input id="phone" placeholder="Phone">
      <input id="email" placeholder="Email">
      <input id="street" placeholder="Address">
      <input id="city" placeholder="City">

      <button class="checkout-btn" onclick="goToPayment()">Continue</button>

      <div id="paymentSection" style="display:none">

        <h3>Payment</h3>

        <div class="payment-option selected"
        data-method="cash_on_delivery"
        onclick="selectPaymentMethod(this)">
        COD
        </div>

        <div class="payment-option"
        data-method="razorpay"
        onclick="selectPaymentMethod(this)">
        Razorpay
        </div>

        <button class="checkout-btn" onclick="placeOrder()">
        Place Order
        </button>

      </div>

    </div>

    <!-- ORDER SUMMARY -->
    <div class="order-summary">

      <h3>Order Summary</h3>

      <div id="summaryItems"></div>

      <p>Subtotal: ₹<span id="summarySubtotal">0</span></p>
      <p>Total: ₹<span id="summaryTotal">0</span></p>

    </div>

  </div>

</div>

<!-- LOGIN MODAL (kept for auth logic) -->
<div id="auth-modal" class="auth-modal">
  <div class="auth-form">
    <h2>Login</h2>
    <input id="username">
    <input id="password" type="password">
    <button onclick="login()">Submit</button>
  </div>
</div>

<!-- ✅ LOAD GLOBAL HEADER -->
<script src="/js/loadHeader.js"></script>

<!-- PAGE JS -->
<script src="/js/checkout.js"></script>

</body>
</html>
