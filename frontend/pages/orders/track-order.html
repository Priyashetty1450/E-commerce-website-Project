<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="Track Your Order - Shri Manjunatha Shamiyana Works & Events">

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ii.css">
  <link rel="stylesheet" href="/css/pages/track-order.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

  <title>Track Order - Shri Manjunatha Shamiyana Works & Events</title>
</head>

<body>

<!-- ✅ GLOBAL NAVBAR -->
<div id="header"></div>

<!-- ================= TRACK ORDER ================= -->

<div class="track-container">

  <div class="track-header">
    <h1>Track Your Order</h1>
    <p>Enter your order ID to track the status of your order</p>
  </div>

  <div class="track-form">

    <h2><i class="fa fa-search"></i> Find Your Order</h2>

    <div class="input-group">
      <input type="email" id="emailInput"
        placeholder="Enter your email address" required>
    </div>

    <div class="input-group">
      <input type="text" id="orderIdInput"
        placeholder="Enter Order ID (e.g., ORD-1234567890)" required>

      <button class="track-btn" onclick="trackOrder()">
        Track Order
      </button>
    </div>

    <p class="track-note">
      Enter the email used during checkout and your order ID.
    </p>

  </div>

  <div class="error-message" id="errorMessage">
    <i class="fa fa-exclamation-circle"></i>
    <span id="errorText">Order not found.</span>
  </div>

  <div class="order-result" id="orderResult">

    <div class="order-info">

      <h2><i class="fa fa-box"></i> Order Details</h2>

      <div class="info-grid">

        <div class="info-item">
          <label>Order ID</label>
          <span id="resultOrderId">-</span>
        </div>

        <div class="info-item">
          <label>Customer Name</label>
          <span id="resultCustomer">-</span>
        </div>

        <div class="info-item">
          <label>Order Date</label>
          <span id="resultDate">-</span>
        </div>

        <div class="info-item">
          <label>Total Amount</label>
          <span id="resultTotal">₹0</span>
        </div>

        <div class="info-item">
          <label>Products</label>
          <span id="resultProducts">-</span>
        </div>

        <div class="info-item">
          <label>Quantity</label>
          <span id="resultQuantity">0</span>
        </div>

      </div>

      <div class="shipping-address"
        id="shippingAddressSection" style="display:none;">

        <h4><i class="fa fa-map-marker"></i> Shipping Address</h4>
        <p id="resultAddress">-</p>

      </div>

    </div>

    <div class="status-timeline">
      <h3><i class="fa fa-truck"></i> Order Status</h3>
      <div class="timeline" id="statusTimeline"></div>
    </div>

  </div>

</div>

<!-- AUTH MODAL (if you still use it here) -->

<div id="auth-modal" class="auth-modal">
  <div class="auth-form">

    <h2 id="auth-title">Login</h2>

    <form id="auth-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Submit</button>
      <button type="button" class="back-btn">Back</button>
    </form>

  </div>
</div>

<!-- PAGE JS -->
<script src="/js/track-order.js"></script>

<!-- LOAD GLOBAL HEADER -->
<script src="/js/loadHeader.js"></script>

</body>
</html>
