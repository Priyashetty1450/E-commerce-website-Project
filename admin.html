
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard for Shri Manjunatha Shamiyana Works & Events">
    <link rel="stylesheet" href="ii.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Admin Dashboard - Shri Manjunatha Shamiyana Works & Events</title>
    <style>
        /* Additional styles for dashboard */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .dashboard-section h2 {
            margin-bottom: 20px;
            color: var(--primary, #333);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            padding: 10px 20px;
            background-color: var(--primary, #007bff);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: var(--dark, #0056b3);
        }
        .product-list, .order-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card, .order-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background-color: white;
        }
        .product-card img {
            max-width: 100%;
            height: auto;
        }
        .summary {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .summary-item {
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
        }
        .summary-item h3 {
            margin: 0;
            font-size: 2em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        table th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo.jpg" alt="Shri Manjunatha Shamiyana Works & Events">
            </div>
            <nav>
                <ul>
                    <li><a href="ii.html">Back to Site</a></li>
                    <li><a href="#add-product">Add Product</a></li>
                    <li><a href="#products">Products</a></li>
                    <li><a href="#orders">Orders</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="dashboard-container">
        <h1>Admin Dashboard</h1>

        <div class="summary">
            <div class="summary-item">
                <h3 id="total-products">0</h3>
                <p>Total Products</p>
            </div>
            <div class="summary-item">
                <h3 id="total-orders">0</h3>
                <p>Total Orders</p>
            </div>
        </div>

        <section id="add-product" class="dashboard-section">
            <h2>Add New Product</h2>
            <form id="product-form">
                <div class="form-group">
                    <label for="product-name">Product Name</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label for="product-image">Upload Image (JPG only)</label>
                    <input type="file" id="product-image" accept=".jpg,.jpeg" required>
                </div>
                <div class="form-group">
                    <label for="product-price">Price (₹)</label>
                    <input type="number" id="product-price" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="product-category">Category</label>
                    <select id="product-category" required>
                        <option value="">Select Category</option>
                        <option value="mural">Wall Murals</option>
                        <option value="stage">Stage Decor</option>
                        <option value="furniture">Furniture</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="product-stock">Stock Quantity</label>
                    <input type="number" id="product-stock" min="0" required>
                </div>
                <div class="form-group">
                    <label for="product-description">Description</label>
                    <textarea id="product-description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn">Add Product</button>
            </form>
        </section>

        <section id="products" class="dashboard-section">
            <h2>Product List</h2>
            <div id="product-list" class="product-list">
                <!-- Products will be dynamically added here -->
            </div>
        </section>

        <section id="orders" class="dashboard-section">
            <h2>Order Tracking</h2>
            <table id="order-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total (₹)</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Orders will be dynamically added here -->
                </tbody>
            </table>
           
    </div>

  <script>
    // 1. Existing Data Loading
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let orders = [];

    async function loadOrders() {
        try {
            const response = await fetch('http://localhost:5000/api/orders');
            if (!response.ok) throw new Error('Network response was not ok');
            orders = await response.json();
            renderOrders();
            updateSummary();
        } catch (err) {
            console.error("Could not load orders from database:", err);
        }
    }

    function updateSummary() {
        document.getElementById('total-products').textContent = products.length;
        document.getElementById('total-orders').textContent = orders.length;
    }

    const ORDER_STATUSES = [
        'Order Placed',
        'Order Packed',
        'Order Shipped',
        'Order Out for Delivery',
        'Delivered',
        'Cancelled',
        'Refunded'
    ];

    function renderOrders() {
        const orderTableBody = document.querySelector('#order-table tbody');
        orderTableBody.innerHTML = '';
        orders.forEach((order, index) => {
            const row = document.createElement('tr');
            
            // Create dropdown options for status
            const statusOptions = ORDER_STATUSES.map(status => 
                `<option value="${status}" ${order.status === status ? 'selected' : ''}>${status}</option>`
            ).join('');

            row.innerHTML = `
                <td>${order.orderId}</td>
                <td>${order.customer}</td>
                <td>${order.product || (order.items ? order.items.map(item => item.name).join(', ') : 'N/A')}</td>
                <td>${order.quantity || (order.items ? order.items.reduce((sum, item) => sum + item.quantity, 0) : 0)}</td>
                <td>₹${order.total}</td>
                <td>
                    <select id="status-${order._id}" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                        ${statusOptions}
                    </select>
                </td>
                <td>
                    <button class="btn" onclick="updateOrderStatus('${order._id}')">Update</button>
                    <button class="btn" style="background-color: red;" onclick="deleteOrder('${order._id}')">Delete</button>
                </td>
            `;
            orderTableBody.appendChild(row);
        });
    }

    function renderProducts() {
        const productList = document.getElementById('product-list');
        productList.innerHTML = '';
        products.forEach((product, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>Price: ₹${product.price}</p>
                <p>${product.description || ''}</p>
                <button class="btn" onclick="editProduct(${index})">Edit</button>
                <button class="btn" style="background-color: red;" onclick="deleteProduct(${index})">Delete</button>
            `;
            productList.appendChild(card);
        });
    }

    // 2. Add Product (Saves to both)
    document.getElementById('product-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('product-image');
        const file = fileInput.files[0];
        
        if (!file || !file.type.match('image/jpeg')) {
            alert('Please select a JPG image.');
            return;
        }

        const reader = new FileReader();
        reader.onload = async function(event) {
            const imageDataUrl = event.target.result;
            const newProduct = {
                name: document.getElementById('product-name').value,
                price: document.getElementById('product-price').value,
                stock: document.getElementById('product-stock').value,
                category: document.getElementById('product-category').value,
                description: document.getElementById('product-description').value,
                image: imageDataUrl
            };

            // LocalStorage
            products.push(newProduct);
            localStorage.setItem('products', JSON.stringify(products));
            
            // MongoDB
            try {
                await fetch('http://localhost:5000/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });
            } catch (err) { console.error("DB Sync Error:", err); }

            renderProducts();
            updateSummary();
            document.getElementById('product-form').reset();
        };
        reader.readAsDataURL(file);
    });

    // 3. Edit Product (Saves to both)
    async function editProduct(index) {
        const product = products[index];
        const oldName = product.name;
        const newPrice = prompt('Edit Price:', product.price);
        const newStock = prompt('Edit Stock:', product.stock);
        
        if (newPrice !== null && newStock !== null) {
            product.price = newPrice;
            product.stock = newStock;

            // LocalStorage
            localStorage.setItem('products', JSON.stringify(products));

            // MongoDB
            try {
                await fetch(`http://localhost:5000/api/products/${encodeURIComponent(oldName)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
            } catch (err) { console.error("DB Update Error:", err); }

            renderProducts();
            updateSummary();
        }
    }

    // 4. Delete Product (Deletes from both)
    async function deleteProduct(index) {
        const productToDelete = products[index];
        if (confirm(`Delete ${productToDelete.name}?`)) {
            const name = productToDelete.name;

            // LocalStorage
            products.splice(index, 1);
            localStorage.setItem('products', JSON.stringify(products));

            // MongoDB
            try {
                await fetch(`http://localhost:5000/api/products/${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });
            } catch (err) { console.error("DB Delete Error:", err); }

            renderProducts();
            updateSummary();
        }
    }

    // Order management functions
    async function addSampleOrder() {
        const sampleOrder = {
            orderId: 'ORD-' + Date.now(),
            customer: 'Demo Customer',
            product: 'Sample Product',
            quantity: Math.floor(Math.random() * 5) + 1,
            total: Math.floor(Math.random() * 1000) + 100,
            status: 'Pending'
        };

        try {
            const response = await fetch('http://localhost:5000/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sampleOrder)
            });
            if (response.ok) {
                await loadOrders();
            } else {
                alert('Failed to add sample order');
            }
        } catch (err) {
            console.error('Error adding sample order:', err);
        }
    }

    async function updateOrderStatus(orderId) {
        const statusSelect = document.getElementById(`status-${orderId}`);
        const newStatus = statusSelect.value;
        
        try {
            const response = await fetch(`http://localhost:5000/api/orders/${orderId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            if (response.ok) {
                await loadOrders();
                alert('Order status updated successfully!');
            } else {
                alert('Failed to update order status');
            }
        } catch (err) {
            console.error('Error updating order status:', err);
        }
    }

    async function deleteOrder(orderId) {
        if (confirm('Are you sure you want to delete this order?')) {
            try {
                const response = await fetch(`http://localhost:5000/api/orders/${orderId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    await loadOrders();
                } else {
                    alert('Failed to delete order');
                }
            } catch (err) {
                console.error('Error deleting order:', err);
            }
        }
    }

    // Initialize UI
    renderProducts();
    loadOrders();
</script>
</body>
</html>
