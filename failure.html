<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment Failed - Shri Manjunatha Shamiyana Works & Events">
    <link rel="stylesheet" href="ii.css">
    <title>Payment Failed - Shri Manjunatha Shamiyana Works & Events</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .failure-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .failure-icon {
            width: 100px;
            height: 100px;
            background: #dc3545;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .failure-icon i {
            font-size: 50px;
            color: white;
        }
        h1 {
            color: #dc3545;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .error-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 25px 0;
            text-align: left;
        }
        .error-details p {
            margin: 10px 0;
            color: #555;
        }
        .error-details strong {
            color: #333;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #8B4513;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #CD853F;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="failure-container">
        <div class="failure-icon">
            <i class="fa fa-times"></i>
        </div>
        <h1>Payment Failed</h1>
        <p>We're sorry, but your payment could not be processed. Please try again or contact support.</p>
        
        <div class="error-details">
            <p><strong>Error Code:</strong> <span id="errorCode">PAYMENT_FAILED</span></p>
            <p><strong>Description:</strong> <span id="errorDescription">Transaction was declined by the payment gateway</span></p>
            <p><strong>Order ID:</strong> <span id="orderId">N/A</span></p>
            <p><strong>Amount:</strong> <span id="amount">₹0</span></p>
            <p><strong>Date:</strong> <span id="date">N/A</span></p>
        </div>
        
        <div>
            <a href="checkout.html" class="btn">Try Again</a>
            <a href="ii.html" class="btn btn-secondary">Continue Shopping</a>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId') || 'N/A';
        const amount = urlParams.get('amount') || '0';
        const errorCode = urlParams.get('errorCode') || 'PAYMENT_FAILED';
        const errorDescription = urlParams.get('errorDescription') || 'Transaction was declined by the payment gateway';

        // Display error details
        document.getElementById('orderId').textContent = orderId;
        document.getElementById('amount').textContent = '₹' + amount;
        document.getElementById('errorCode').textContent = errorCode;
        document.getElementById('errorDescription').textContent = errorDescription;
        document.getElementById('date').textContent = new Date().toLocaleDateString('en-IN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    </script>
</body>
</html>
