<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shopping Cart - Shri Manjunatha Shamiyana Works & Events">
    <link rel="stylesheet" href="ii.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Shopping Cart - Shri Manjunatha Shamiyana Works & Events</title>
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
        }
        .cart-item img {
            max-width: 100px;
            height: auto;
            margin-right: 15px;
        }
        .cart-item-details {
            flex-grow: 1;
        }
        .cart-item-details h3 {
            margin: 0 0 5px 0;
        }
        .cart-item-details p {
            margin: 0 0 5px 0;
        }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            margin-right: 15px;
        }
        .cart-item-quantity button {
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cart-item-quantity input {
            width: 50px;
            text-align: center;
            margin: 0 10px;
        }
        .cart-item-total {
            font-weight: bold;
            margin-right: 15px;
        }
        .remove-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .cart-summary {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background-color: #f9f9f9;
            margin-top: 20px;
        }
        .cart-summary h3 {
            margin-top: 0;
        }
        .checkout-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .checkout-btn:hover {
            background-color: #218838;
        }
        .empty-cart {
            text-align: center;
            padding: 50px;
        }
        
        /* Address Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            margin-top: 0;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .submit-order-btn {
            background-color: #28a745;
            color: white;
        }
        
        .submit-order-btn:hover {
            background-color: #218838;
        }
        
        .cancel-btn {
            background-color: #6c757d;
            color: white;
        }
        
        .cancel-btn:hover {
            background-color: #5a6268;
        }
        
        .order-summary-box {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .order-summary-box h4 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        
        .order-summary-box p {
            margin: 5px 0;
        }
        
        .required-field::after {
            *";
            color content: ": red;
        }
        
        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .form-group.error input {
            border-color: red;
        }
        
        .form-group.error .error-message {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo.jpg" alt="Shri Manjunatha Shamiyana Works & Events">
            </div>
            <div class="search-bar"> <input type="text" placeholder="Search..." aria-label="Search"> <button type="button" aria-label="Search"> <i class="fa fa-search"></i> </button> </div>

            <div class="mobile-menu-btn">
                ☰
            </div>

            <nav>
                <ul>
                    <li><a href="ii.html">Home</a></li>
                    <li><a href="#">Shop</a></li>
                    <li><a href="Service.html">Service</a></li>
                    <li><a href="About.html">About Us</a></li>
                    <li><a href="Contact-us.html">Contact</a></li>
                    <li id="login-btn"><a href="#" onclick="showAuthModal('login')">Login</a></li>
                    <li id="logout-btn" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
                </ul>
            </nav>

            <div class="cart-icon">
                <a href="cart.html"><i class="fa fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <div class="cart-container">
        <h1>Shopping Cart</h1>
        <div id="cart-items">
            <!-- Cart items will be displayed here -->
        </div>
        <div id="cart-summary" class="cart-summary" style="display: none;">
            <h3>Order Summary</h3>
            <p>Total Items: <span id="total-items">0</span></p>
            <p>Total Amount: ₹<span id="total-amount">0</span></p>
<button class="checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Auth Modal (same as ii.html) -->
    <div id="auth-modal" class="auth-modal" onclick="closeAuthModal()">
        <div class="auth-form" onclick="event.stopPropagation()">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Submit</button>
                <button type="button" class="back-btn" onclick="closeAuthModal()">Back</button>
            </form>
            <div class="forgot-password">
                <a href="#" onclick="forgotPassword()">Forgot Password?</a>
            </div>
            <div class="divider">
                <span>or</span>
            </div>
            <button class="google-btn" onclick="continueWithGoogle()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <div class="switch-form">
                <a onclick="switchForm()">Switch to Signup</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let isLogin = true;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Authentication functions (same as ii.html)
        function showAuthModal(type) {
            isLogin = type === 'login';
            document.getElementById('auth-title').textContent = isLogin ? 'Login' : 'Signup';
            document.getElementById('auth-modal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }

        function switchForm() {
            isLogin = !isLogin;
            document.getElementById('auth-title').textContent = isLogin ? 'Login' : 'Signup';
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/auth/login' : '/auth/signup';

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    closeAuthModal();
                    updateUI();
                    if (data.role === 'admin') window.location.href = 'admin.html';
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            updateUI();
        }

        function updateUI() {
            const token = localStorage.getItem('token');
            document.getElementById('login-btn').style.display = token ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = token ? 'block' : 'none';
        }

        async function continueWithGoogle() {
            try {
                const response = await fetch(`${API_BASE}/auth/google`, {
                    method: 'GET'
                });
                
                const data = await response.json();
                
                if (data.demoMode) {
                    const email = prompt('Demo Mode: Please enter your email:');
                    if (!email) return;
                    
                    const name = prompt('Demo Mode: Please enter your name (optional):');
                    
                    const demoResponse = await fetch(`${API_BASE}/auth/google/demo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, name: name || '' })
                    });
                    
                    const demoData = await demoResponse.json();
                    
                    if (demoData.success) {
                        localStorage.setItem('token', demoData.token);
                        localStorage.setItem('role', demoData.role);
                        closeAuthModal();
                        updateUI();
                        alert('Successfully logged in with Google (Demo)!');
                    } else {
                        alert(demoData.message || 'Demo login failed');
                    }
                } else if (data.authUrl) {
                    window.location.href = data.authUrl;
                }
            } catch (err) {
                alert('Error initiating Google login. Please try again.');
                console.error(err);
            }
        }

        // Cart functions
        function renderCart() {
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart"><h2>Your cart is empty</h2><p><a href="ii.html">Continue Shopping</a></p></div>';
                document.getElementById('cart-summary').style.display = 'none';
                return;
            }

            let totalItems = 0;
            let totalAmount = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                totalItems += item.quantity;
                totalAmount += itemTotal;

                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <p>₹${item.price}</p>
                    </div>
                    <div class="cart-item-quantity">
                        <button onclick="updateQuantity(${index}, -1)">-</button>
                        <input type="number" value="${item.quantity}" min="1" onchange="changeQuantity(${index}, this.value)">
                        <button onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                    <div class="cart-item-total">₹${itemTotal}</div>
                    <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                `;
                cartItems.appendChild(cartItem);
            });

            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('total-amount').textContent = totalAmount;
            document.getElementById('cart-summary').style.display = 'block';
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            saveCart();
            renderCart();
        }

        function changeQuantity(index, newQuantity) {
            const qty = parseInt(newQuantity);
            if (qty > 0) {
                cart[index].quantity = qty;
                saveCart();
                renderCart();
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

function goToCheckout() {
            // Redirect to checkout page with cart data
            if (cart.length === 0) {
                alert('Your cart is empty.');
                return;
            }
            window.location.href = 'checkout.html';
        }

        // Initialize
        window.addEventListener('load', () => {
            updateUI();
            renderCart();
        });
    </script>
</body>
</html>
